server:
  address: 'tcp://0.0.0.0:9091'

log:
  level: info

identity_validation:
  reset_password:
    jwt_secret: '${AUTHELIA_JWT_SECRET}'

totp:
  issuer: avataryx.de

authentication_backend:
  file:
    path: /config/users_database.yml
access_control:
  default_policy: deny
  rules:
    - domain: 'auth.internal.avataryx.de'
      policy: bypass
    - domain: 'auth.avataryx.de'
      policy: bypass

    - domain: 'homer.internal.avataryx.de'
      policy: one_factor
    - domain: 'homer.avataryx.de'
      policy: one_factor

    - domain: 'adguard.internal.avataryx.de'
      policy: one_factor
    - domain: 'adguard.avataryx.de'
      policy: one_factor

    - domain: 'portainer.internal.avataryx.de'
      policy: one_factor
    - domain: 'portainer.avataryx.de'
      policy: one_factor

    - domain: 'pgadmin.internal.avataryx.de'
      policy: one_factor
    - domain: 'pgadmin.avataryx.de'
      policy: one_factor

    - domain: 'vaultwarden.internal.avataryx.de'
      policy: one_factor
    - domain: 'vaultwarden.avataryx.de'
      policy: one_factor

    - domain: 'prometheus.internal.avataryx.de'
      policy: one_factor

    - domain: 'grafana.internal.avataryx.de'
      policy: one_factor

    - domain: 'kuma.internal.avataryx.de'
      policy: one_factor

session:
  secret: '${AUTHELIA_SESSION_SECRET}'
  cookies:
    - name: authelia_session_internal
      domain: 'internal.avataryx.de'
      authelia_url: 'https://auth.internal.avataryx.de'
      default_redirection_url: 'https://homer.internal.avataryx.de'
      same_site: lax
      expiration: 12h
      inactivity: 45m

    - name: authelia_session_external
      domain: 'avataryx.de'
      authelia_url: 'https://auth.avataryx.de'
      default_redirection_url: 'https://homer.avataryx.de'
      same_site: lax
      expiration: 12h
      inactivity: 45m 
  redis:
    host: authelia-redis
    port: 6379
    password: 'Butch*20052023'

storage:
  encryption_key: '${AUTHELIA_ENCRYPTION_KEY}'
  local:
    path: /config/db.sqlite3

notifier:
  filesystem:
    filename: /config/notification.txt
