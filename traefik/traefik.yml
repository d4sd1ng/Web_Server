api:
  dashboard: true
  debug: false

log:
  level: INFO
  format: common

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  docker:
    watch: true
    useBindPortIP: true
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: server
  file:
    directory: /config
    watch: true

certificatesResolvers:
  cloudflare:
    acme:
      email: t.schneiderx@yahoo.de
      storage: /letsencrypt/acme.json
      dnsChallenge:
        provider: cloudflare

accessLog: {}
