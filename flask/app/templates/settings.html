<h1>⚙️ Server Einstellungen</h1>
<form method="post" action="/settings/update">
    <label for="hostname">Hostname:</label>
    <input type="text" id="hostname" name="hostname" value="{{ settings.hostname }}" required><br>
    <label for="ip_address">IP-Adresse:</label>
    <input type="text" id="ip_address" name="ip_address" value="{{ settings.ip_address }}" required><br>
    <label for="dns_server">DNS-Server:</label>
    <input type="text" id="dns_server" name="dns_server" value="{{ settings.dns_server }}" required><br>
    <button type="submit">Speichern</button>
</form>
<a href="/dashboard">Zurück zum Dashboard</a>
