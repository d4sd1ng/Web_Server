<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datenbanken</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #1e1e1e;
            color: #c0c0c0;
        }
        .databases-container {
            padding: 20px;
            background-color: #2e2e2e;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }
        .form-label {
            font-weight: bold;
            color: #c0c0c0;
        }
    </style>
</head>
<body>
<div class="container databases-container">
    <h1>Datenbanken</h1>
    <ul class="list-group" id="database-list">
        <!-- Dynamische Liste der Datenbanken wird hier eingefügt -->
    </ul>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        fetch('/databases/list')
            .then(response => response.json())
            .then(data => {
                const list = document.getElementById('database-list');
                data.forEach(db => {
                    const listItem = document.createElement('li');
                    listItem.className = 'list-group-item';
                    listItem.textContent = db;
                    list.appendChild(listItem);
                });
            });
    });
</script>
</body>
</html>
