<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mounts</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #1e1e1e;
            color: #c0c0c0;
        }
        .mounts-container {
            padding: 20px;
            background-color: #2e2e2e;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }
        .form-label {
            font-weight: bold;
            color: #c0c0c0;
        }
        .form-control, .form-select {
            background-color: #3e3e3e;
            color: #e0e0e0;
            border: 1px solid #555555;
        }
        .form-control:focus, .form-select:focus {
            background-color: #3e3e3e;
            color: #e0e0e0;
            border-color: #777777;
            box-shadow: 0 0 5px rgba(119, 119, 119, 0.5);
        }
        .btn-primary {
            background-color: #007bff;
            border-color: #007bff;
        }
        .btn-primary:hover {
            background-color: #0056b3;
            border-color: #0056b3;
        }
    </style>
</head>
<body>
<div class="container mounts-container">
    <h1>Mounts</h1>
    <form id="mount-form" method="post" action="/mounts/add">
        <div class="mb-3">
            <label for="platform" class="form-label">Plattform:</label>
            <select class="form-select" id="platform" name="platform" required>
                <option value="windows">Windows</option>
                <option value="linux">Linux</option>
            </select>
        </div>
        <div class="mb-3">
            <label for="device" class="form-label">Ger‰t:</label>
            <input type="text" class="form-control" id="device" name="device" required>
        </div>
        <div class="mb-3">
            <label for="mount_point" class="form-label">Mount-Punkt:</label>
            <input type="text" class="form-control" id="mount_point" name="mount_point" required placeholder="/mnt/mein_laufwerk">
        </div>
        <button type="submit" class="btn btn-primary">Mount hinzuf¸gen</button>
    </form>
    <hr>
    <h2>Vorhandene Mounts</h2>
    <ul class="list-group">
        {% for mount in mounts %}
        <li class="list-group-item">
            Plattform: {{ mount.platform }}, Ger‰t: {{ mount.device }}, Mount-Punkt: {{ mount.mount_point }}
        </li>
        {% endfor %}
    </ul>
</div>
</body>
</html>
