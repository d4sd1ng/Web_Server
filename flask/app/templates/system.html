<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/styles.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const cpuChartCtx = document.getElementById("cpuChart").getContext("2d");
            const memoryChartCtx = document.getElementById("memoryChart").getContext("2d");
            const tempChartCtx = document.getElementById("tempChart").getContext("2d");

            const cpuChart = new Chart(cpuChartCtx, {
                type: "doughnut",
                data: {
                    labels: ["Genutzt", "Frei"],
                    datasets: [{
                        data: [0, 100],
                        backgroundColor: ["#03dac6", "#1f1f1f"],
                    }]
                },
                options: { responsive: true, plugins: { legend: { display: true } }, cutout: "80%" }
            });

            const memoryChart = new Chart(memoryChartCtx, {
                type: "doughnut",
                data: {
                    labels: ["Genutzt", "Frei"],
                    datasets: [{
                        data: [0, 100],
                        backgroundColor: ["#ff005a", "#1f1f1f"],
                    }]
                },
                options: { responsive: true, plugins: { legend: { display: true } }, cutout: "80%" }
            });

            const tempChart = new Chart(tempChartCtx, {
                type: "doughnut",
                data: {
                    labels: ["Temperatur", "Rest"],
                    datasets: [{
                        data: [0, 100],
                        backgroundColor: ["#ffcc00", "#1f1f1f"],
                    }]
                },
                options: { responsive: true, plugins: { legend: { display: true } }, cutout: "80%" }
            });

            async function fetchMetrics() {
                try {
                    const response = await fetch("/api/metrics");
                    const data = await response.json();

                    cpuChart.data.datasets[0].data = [data.cpu, 100 - data.cpu];
                    memoryChart.data.datasets[0].data = [data.memory, 100 - data.memory];
                    tempChart.data.datasets[0].data = [data.temp, 100 - data.temp];

                    cpuChart.update();
                    memoryChart.update();
                    tempChart.update();
                } catch (error) {
                    console.error("Fehler beim Abrufen der Metriken:", error);
                }
            }

            fetchMetrics();
            setInterval(fetchMetrics, 5000);
        });
    </script>
</head>
<body>
<div class="container-fluid">
    <header class="text-center">
        <h1>Server-Dashboard</h1>
    </header>
    <div class="row">
        <nav class="col-md-3 col-lg-2 sidebar">
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link active" href="#system">Systemmetriken</a></li>
            </ul>
        </nav>
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <div id="system" class="content">
                <h2>Systemmetriken</h2>
                <div class="row">
                    <div class="col-md-4">
                        <canvas id="cpuChart"></canvas>
                        <p class="text-center">CPU-Auslastung</p>
                    </div>
                    <div class="col-md-4">
                        <canvas id="memoryChart"></canvas>
                        <p class="text-center">Speicher-Auslastung</p>
                    </div>
                    <div class="col-md-4">
                        <canvas id="tempChart"></canvas>
                        <p class="text-center">Temperatur</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
</body>
<html>
