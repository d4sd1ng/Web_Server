<!DOCTYPE html>
<html lang="de" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fail2Ban</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/styles.css" rel="stylesheet">
</head>
<body class="p-4">
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Fail2Ban</h2>
    <a href="{{ url_for('dashboard.dashboard') }}" class="btn btn-secondary">← Dashboard</a>
</div>
<div class="card mb-4">
    <div class="card-body">
        <h5 class="card-title">Gesperrte IPs</h5>
        <table class="table table-sm" id="ip-table">
            <thead><tr><th>Jail</th><th>Gesperrte IPs</th></tr></thead>
            <tbody><tr><td colspan="2" class="text-muted">Lädt…</td></tr></tbody>
        </table>
    </div>
</div>
<div class="card mb-4">
    <div class="card-body">
        <h5 class="card-title">IP entsperren</h5>
        <form id="unban-form" class="row g-3">
            <div class="col-md-5">
                <input type="text" class="form-control" id="ip" name="ip" placeholder="IP-Adresse" required>
            </div>
            <div class="col-md-5">
                <input type="text" class="form-control" id="jail" name="jail" placeholder="Jail (z.B. sshd)" required>
            </div>
            <div class="col-md-2">
                <button type="button" class="btn btn-primary w-100" onclick="unbanIp()">Entsperren</button>
            </div>
        </form>
    </div>
</div>
<div class="card">
    <div class="card-body">
        <h5 class="card-title">Logs</h5>
        <ul id="log-list" class="small text-muted"><li>Lädt…</li></ul>
    </div>
</div>
<script>
    async function fetchBannedIps() {
        const res = await fetch('/fail2ban/ips');
        const data = await res.json();
        const tbody = document.querySelector('#ip-table tbody');
        if (!data.banned_ips) { tbody.innerHTML = '<tr><td colspan="2">Keine Daten</td></tr>'; return; }
        tbody.innerHTML = Object.entries(data.banned_ips).map(([jail, ips]) =>
            `<tr><td>${jail}</td><td>${ips.length ? ips.join(', ') : '—'}</td></tr>`
        ).join('');
    }

    async function fetchLogs() {
        const res = await fetch('/fail2ban/logs');
        const data = await res.json();
        const list = document.getElementById('log-list');
        list.innerHTML = (data.logs || []).map(l => `<li>${l}</li>`).join('') || '<li>Keine Logs</li>';
    }

    async function unbanIp() {
        const form = new FormData(document.getElementById('unban-form'));
        const res = await fetch('/fail2ban/unban', { method: 'POST', body: form });
        const result = await res.json();
        alert(res.ok ? result.message : result.error);
        fetchBannedIps();
    }

    fetchBannedIps();
    fetchLogs();
</script>
</body>
</html>
