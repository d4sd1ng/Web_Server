<!DOCTYPE html>
<html lang="de" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datenbanken</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/styles.css" rel="stylesheet">
</head>
<body class="p-4">
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Datenbanken</h2>
    <a href="{{ url_for('dashboard.dashboard') }}" class="btn btn-secondary">← Dashboard</a>
</div>
{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}
<div class="card">
    <div class="card-body">
        <h5 class="card-title">Verfügbare Datenbanken</h5>
        <ul class="list-group" id="database-list">
            <li class="list-group-item text-muted">Lädt…</li>
        </ul>
    </div>
</div>
<script>
    fetch('/databases/list')
        .then(r => r.json())
        .then(data => {
            const list = document.getElementById('database-list');
            if (data.error) {
                list.innerHTML = `<li class="list-group-item text-danger">${data.error}</li>`;
                return;
            }
            list.innerHTML = data.map(db =>
                `<li class="list-group-item">${db}</li>`
            ).join('');
        });
</script>
</body>
</html>
