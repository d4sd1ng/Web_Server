<!DOCTYPE html>
<html lang="de" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloader</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/styles.css" rel="stylesheet">
</head>
<body class="p-4">
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Downloader</h2>
    <a href="{{ url_for('dashboard.dashboard') }}" class="btn btn-secondary">← Dashboard</a>
</div>
<div class="card">
    <div class="card-body">
        <form action="/downloader/download" method="post">
            <div class="mb-3">
                <label for="urls" class="form-label">URLs (eine pro Zeile)</label>
                <textarea class="form-control" id="urls" name="urls" rows="4" required></textarea>
            </div>
            <div class="mb-3">
                <label for="destination" class="form-label">Zielverzeichnis</label>
                <select class="form-select" id="destination" name="destination" required>
                    {% for directory in directories %}
                    <option value="{{ directory }}">{{ directory }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Herunterladen</button>
        </form>
    </div>
</div>
</body>
</html>
