<!DOCTYPE html>
<html lang="de" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Einstellungen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/styles.css" rel="stylesheet">
</head>
<body class="p-4">
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Einstellungen</h2>
    <a href="{{ url_for('dashboard.dashboard') }}" class="btn btn-secondary">← Dashboard</a>
</div>
<div class="card">
    <div class="card-body">
        <h5 class="card-title">Systemeinstellungen</h5>
        <form method="post" action="/settings/update" class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Hostname</label>
                <input type="text" class="form-control" name="hostname" value="{{ settings.hostname if settings else '' }}">
            </div>
            <div class="col-md-6">
                <label class="form-label">IP-Adresse</label>
                <input type="text" class="form-control" name="ip_address" value="{{ settings.ip_address if settings else '' }}">
            </div>
            <div class="col-md-6">
                <label class="form-label">DNS-Server</label>
                <input type="text" class="form-control" name="dns_server" value="{{ settings.dns_server if settings else '' }}">
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-primary">Speichern</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
